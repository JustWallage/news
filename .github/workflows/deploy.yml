name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"

jobs:
  check-and-build:
    uses: ./.github/workflows/check-and-build.yml

  terraform:
    needs: check-and-build
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    outputs:
      d1_database_id_prod: ${{ steps.tf_outputs.outputs.d1_database_id_prod }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14"
          terraform_wrapper: false

      - name: Terraform init (R2 backend)
        run: |
          terraform -chdir=iac init -input=false \
            -backend-config="endpoints={s3=\"https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

      - name: Terraform apply
        run: terraform -chdir=iac apply -input=false -auto-approve

      - name: Read outputs
        id: tf_outputs
        run: echo "d1_database_id_prod=$(terraform -chdir=iac output -raw d1_database_id_prod)" >> "$GITHUB_OUTPUT"

  check-skip-e2e:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.parse.outputs.skip }}
    steps:
      - id: parse
        env:
          COMMIT_TITLE: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s' "$COMMIT_TITLE" | head -1 | grep -q -- "-skip-e2e"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  ephemeral-e2e:
    needs: [check-and-build, check-skip-e2e]
    if: needs.check-skip-e2e.outputs.skip != 'true'
    uses: ./.github/workflows/ephemeral-e2e.yml
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      WORKERS_DEV_SUBDOMAIN: ${{ secrets.WORKERS_DEV_SUBDOMAIN }}

  deploy-prod:
    needs: [check-and-build, terraform, ephemeral-e2e]
    # Deploys are serialized and never cancelled mid-flight.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    # Runs when E2E succeeded OR was explicitly skipped via -skip-e2e.
    if: >-
      always() &&
      needs.check-and-build.result == 'success' &&
      needs.terraform.result == 'success' &&
      (needs.ephemeral-e2e.result == 'success' || needs.ephemeral-e2e.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Template production D1 id
        run: sed -i "s/TEMPLATE_PROD_DB_ID/${{ needs.terraform.outputs.d1_database_id_prod }}/" wrangler.jsonc

      - name: Apply migrations to production D1
        run: pnpm exec wrangler d1 migrations apply DB --remote --env production

      - name: Build (production environment)
        run: CLOUDFLARE_ENV=production pnpm build

      - name: Deploy
        run: pnpm exec wrangler deploy -c dist/news/wrangler.json

      # Push the Telegram bot credentials onto the just-deployed worker. Both are
      # optional — when the GHA secrets are unset the bot simply stays disabled
      # (createDeps falls back to the no-op client; the webhook fails closed).
      - name: Set Telegram worker secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            printf '%s' "$TELEGRAM_BOT_TOKEN" \
              | pnpm exec wrangler secret put TELEGRAM_BOT_TOKEN -c dist/news/wrangler.json
          fi
          if [ -n "$TELEGRAM_WEBHOOK_SECRET" ]; then
            printf '%s' "$TELEGRAM_WEBHOOK_SECRET" \
              | pnpm exec wrangler secret put TELEGRAM_WEBHOOK_SECRET -c dist/news/wrangler.json
          fi

      # Push the Google OAuth credentials onto the just-deployed worker. Without
      # them the worker runs but /auth/* fails closed (503) — login is broken
      # until both are set (production never falls back to the fake OAuth seam).
      - name: Set Google worker secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if [ -n "$GOOGLE_CLIENT_ID" ]; then
            printf '%s' "$GOOGLE_CLIENT_ID" \
              | pnpm exec wrangler secret put GOOGLE_CLIENT_ID -c dist/news/wrangler.json
          fi
          if [ -n "$GOOGLE_CLIENT_SECRET" ]; then
            printf '%s' "$GOOGLE_CLIENT_SECRET" \
              | pnpm exec wrangler secret put GOOGLE_CLIENT_SECRET -c dist/news/wrangler.json
          fi

      # Push the Cloudflare Turnstile credentials onto the just-deployed worker.
      # Both are optional — when unset the sign-in bot-gate stays off (the sign-in
      # screen renders the plain button and the worker skips verification). The
      # site key is public but installed as a secret to avoid committing it.
      - name: Set Turnstile worker secrets
        env:
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          if [ -n "$TURNSTILE_SITE_KEY" ]; then
            printf '%s' "$TURNSTILE_SITE_KEY" \
              | pnpm exec wrangler secret put TURNSTILE_SITE_KEY -c dist/news/wrangler.json
          fi
          if [ -n "$TURNSTILE_SECRET_KEY" ]; then
            printf '%s' "$TURNSTILE_SECRET_KEY" \
              | pnpm exec wrangler secret put TURNSTILE_SECRET_KEY -c dist/news/wrangler.json
          fi

      # Register the bot's slash-command list so Telegram shows autocomplete.
      # Same token guard as above; the list is the single source of truth shared
      # with the worker (worker/lib/bot-commands.json).
      - name: Register Telegram bot commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -fsS -X POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setMyCommands" \
              -H "Content-Type: application/json" \
              --data @worker/lib/bot-commands.json
          fi
